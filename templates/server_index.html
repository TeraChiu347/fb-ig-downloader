<title>FB / IG 影片下載工具</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f2f3f7;
    --card: #ffffff;
    --text: #1c1e26;
    --muted: #6b7280;
    --border: #e3e5ea;
    --accent: #6d5efc;
    --accent-hover: #5a4de0;
    --track: #ece9ff;
    --log-bg: #f7f7fa;
    --log-text: #6b7280;
    --ok: #2fae61;
    --fail: #e6484d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14151b;
      --card: #1e2029;
      --text: #eceef4;
      --muted: #9297a6;
      --border: #2c2f3a;
      --track: #2a2740;
      --log-bg: #17181f;
      --log-text: #8b8fa3;
    }
  }

  * { box-sizing: border-box; }

  body {
    font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }

  .card {
    width: 100%;
    max-width: 600px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
  }

  h1 {
    font-size: 20px;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13.5px;
    margin: 0 0 20px;
  }

  textarea {
    width: 100%;
    height: 100px;
    font-size: 14px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    background: transparent;
    color: var(--text);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: default; }

  .hint {
    color: var(--muted);
    font-size: 12.5px;
  }

  /* 貓咪跑跑進度條 */
  .runway {
    position: relative;
    margin-top: 22px;
    height: 44px;
  }
  .runway-track {
    position: absolute;
    inset: 0;
    background: var(--track);
    border-radius: 22px;
    overflow: hidden;
  }
  .runway-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #a996ff);
    border-radius: 22px;
    transition: width 0.35s ease;
  }
  .cat {
    position: absolute;
    top: 50%;
    left: 0%;
    font-size: 24px;
    transform: translate(-50%, -50%);
    transition: left 0.35s ease;
    animation: run 0.28s infinite alternate;
  }
  .cat.idle { animation: none; }
  .cat.celebrate { animation: none; font-size: 26px; }
  @keyframes run {
    from { transform: translate(-50%, -62%) rotate(-6deg); }
    to   { transform: translate(-50%, -38%) rotate(6deg); }
  }

  .meow-bubble {
    position: absolute;
    top: -6px;
    left: 0%;
    transform: translate(-50%, -100%) scale(0.6);
    background: #fff;
    color: #1c1e26;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s;
  }
  .meow-bubble::after {
    content: "";
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #fff;
  }
  .meow-bubble.show {
    opacity: 1;
    transform: translate(-50%, -100%) scale(1);
  }

  .status-line {
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--muted);
    min-height: 16px;
    text-align: center;
  }

  .downloads {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .downloads a {
    display: block;
    background: var(--track);
    color: var(--text);
    text-decoration: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13.5px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .downloads a:hover { opacity: 0.8; }

  .log-toggle {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .log-toggle:hover { color: var(--accent); }

  #log {
    display: none;
    margin-top: 8px;
    max-height: 140px;
    overflow-y: auto;
    background: var(--log-bg);
    color: var(--log-text);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11.5px;
    line-height: 1.6;
  }
  #log.open { display: block; }
  #log .ok { color: var(--ok); }
  #log .fail { color: var(--fail); }
</style>

<div class="card">
  <h1>🎬 FB / IG 影片下載工具</h1>
  <p class="subtitle">
    貼上 Facebook 或 Instagram 影片網址<br>
    如要一次下載多部影片，請每行貼一個網址（按 Enter 換行）
  </p>
  <textarea id="urls" placeholder="https://www.facebook.com/reel/...&#10;https://www.instagram.com/reel/..."></textarea>
  <div class="row">
    <button id="startBtn" onclick="startDownload()">開始下載</button>
    <span class="hint">下載完成後，下方會出現檔案下載連結</span>
  </div>

  <div class="runway">
    <div class="runway-track">
      <div class="runway-fill" id="runwayFill"></div>
    </div>
    <div class="meow-bubble" id="meowBubble"></div>
    <div class="cat idle" id="cat">🐱</div>
  </div>
  <div class="status-line" id="statusLine">貼上網址後按「開始下載」</div>

  <div class="downloads" id="downloads"></div>

  <div class="log-toggle" id="logToggle" onclick="toggleLog()">顯示詳細記錄 ▾</div>
  <div id="log"></div>
</div>

<script>
function lineClass(text) {
  if (text.startsWith("完成")) return "ok";
  if (text.startsWith("失敗") || text.startsWith("略過")) return "fail";
  return "";
}

function toggleLog() {
  const log = document.getElementById("log");
  const toggle = document.getElementById("logToggle");
  const open = log.classList.toggle("open");
  toggle.textContent = open ? "隱藏詳細記錄 ▴" : "顯示詳細記錄 ▾";
}

function setProgress(pct, catEl, fillEl, bubbleEl) {
  fillEl.style.width = pct + "%";
  catEl.style.left = pct + "%";
  if (bubbleEl) bubbleEl.style.left = pct + "%";
}

let meowTimer = null;
function showMeow(bubbleEl, text) {
  clearTimeout(meowTimer);
  bubbleEl.textContent = text;
  bubbleEl.classList.add("show");
  meowTimer = setTimeout(() => bubbleEl.classList.remove("show"), 1800);
}

async function startDownload() {
  const text = document.getElementById("urls").value;
  const btn = document.getElementById("startBtn");
  const log = document.getElementById("log");
  const cat = document.getElementById("cat");
  const fill = document.getElementById("runwayFill");
  const bubble = document.getElementById("meowBubble");
  const statusLine = document.getElementById("statusLine");
  const downloads = document.getElementById("downloads");

  log.innerHTML = "";
  downloads.innerHTML = "";
  btn.disabled = true;
  cat.classList.remove("idle", "celebrate");
  cat.textContent = "🐱";
  bubble.classList.remove("show");
  setProgress(0, cat, fill, bubble);
  statusLine.textContent = "準備中...";

  let lastLogLine = null;

  const resp = await fetch("/download", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text }),
  });

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop();
    for (const raw of lines) {
      const isProgress = raw.startsWith("\r");
      const content = isProgress ? raw.slice(1) : raw;

      if (content.startsWith("READY:")) {
        const rest = content.slice("READY:".length);
        const idx = rest.indexOf(":");
        const token = rest.slice(0, idx);
        const filename = rest.slice(idx + 1);
        const a = document.createElement("a");
        a.href = "/file/" + token;
        a.textContent = "⬇️ 下載：" + filename;
        downloads.appendChild(a);
        continue;
      }

      if (isProgress && lastLogLine) {
        lastLogLine.textContent = content;
      } else {
        lastLogLine = document.createElement("div");
        lastLogLine.textContent = content;
        lastLogLine.className = lineClass(content);
        log.appendChild(lastLogLine);
      }
      log.scrollTop = log.scrollHeight;

      const m = content.match(/下載中\s+([\d.]+)%/);
      if (m) {
        setProgress(parseFloat(m[1]), cat, fill, bubble);
        statusLine.textContent = "下載中 " + m[1] + "%";
      } else if (content.startsWith("處理中")) {
        statusLine.textContent = "處理中（合併/轉檔）...";
      } else if (content.startsWith("開始下載")) {
        setProgress(0, cat, fill, bubble);
        statusLine.textContent = content;
      } else if (content.startsWith("完成")) {
        setProgress(100, cat, fill, bubble);
        cat.classList.add("celebrate");
        cat.textContent = "😻";
        showMeow(bubble, "喵～");
        statusLine.textContent = content;
      } else if (content.startsWith("失敗") || content.startsWith("略過")) {
        cat.classList.add("celebrate");
        cat.textContent = "🙀";
        showMeow(bubble, "喵？！");
        statusLine.textContent = content;
      } else if (content.startsWith("全部完成")) {
        cat.classList.add("idle");
        cat.classList.remove("celebrate");
        cat.textContent = "😻";
        setProgress(100, cat, fill, bubble);
        showMeow(bubble, "喵喵～全部完成！");
        statusLine.textContent = "全部完成！";
      }
    }
  }

  btn.disabled = false;
}
</script>
